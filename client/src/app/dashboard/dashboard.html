<mat-toolbar color="primary" class="dashboard-header">
  <img src="/greenhouse-monitor-logo.png" alt="Greenhouse Monitor logo" class="header-logo" />
  <span class="header-title">Greenhouse Monitor</span>

  <span class="header-spacer"></span>

  @if (lastUpdated$ | async; as updated) {
    <span class="header-updated">Updated {{ updated | date: 'mediumTime' }}</span>
  }

  @if (hasHeartbeat$ | async) {
    @if (isLive$ | async) {
      <span class="connection connection--live" aria-label="Live">
        <span class="connection__dot"></span>
        <span class="connection__label">LIVE</span>
      </span>
    } @else {
      <span class="connection connection--offline" aria-label="Offline">
        <mat-icon class="connection__icon">wifi_off</mat-icon>
        <span class="connection__label">OFFLINE</span>
      </span>
    }
  }
</mat-toolbar>

<main class="dashboard-body">
  <!-- Sensor cards (SPEC 2.1). -->
  <section class="cards-grid">
    @if (currentReading$ | async; as reading) {
      <app-sensor-card
        label="Temperature"
        unit="°C"
        [value]="reading.temperature"
        [fractionDigits]="1"
        [status]="statusFor('temperature', reading.temperature)" />
      <app-sensor-card
        label="Humidity"
        unit="%"
        [value]="reading.humidity"
        [fractionDigits]="1"
        [status]="statusFor('humidity', reading.humidity)" />
      <app-sensor-card
        label="CO₂"
        unit="ppm"
        [value]="reading.co2Ppm"
        [fractionDigits]="0"
        [status]="statusFor('co2', reading.co2Ppm)" />
    } @else {
      <div class="tile tile--empty">Waiting for sensor data…</div>
    }
  </section>

  <!-- Anomaly list and chart (FEATURE-12) mount here. -->
  <section class="panels">
    <app-anomaly-list />
    <div class="panel panel--placeholder">Chart — FEATURE-12</div>
  </section>
</main>
